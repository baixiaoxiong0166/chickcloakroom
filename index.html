        .header {
            background: transparent;
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .chicken-icon {
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.7);
            font-size: 14px;
            cursor: pointer;
            min-width: 100px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .upload-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #6366f1;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
            cursor: pointer;
            z-index: 1000;
            border: none;
            transition: transform 0.2s;
        }

        .upload-btn:hover {
            transform: scale(1.1);
        }

        .closet-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .cloth-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .cloth-card img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
        }

        .cloth-info {
            padding: 12px;
        }

        .cloth-brand {
            font-weight: 600;
            font-size: 12px;
            color: #333;
            margin-bottom: 4px;
        }

        .cloth-type {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .cloth-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .cloth-colors {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #ddd;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,0,0,0.7);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: none;
        }

        .cloth-card:hover .delete-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 16px;
            width: 95%;
            max-width: none;
            height: auto;
            max-height: 92vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 24px;
            height: 24px;
            line-height: 24px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }

        .upload-area:hover {
            border-color: #6366f1;
        }

        .upload-area img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 8px;
        }

        .upload-text {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .color-picker-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .color-option {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option.selected {
            border-color: #6366f1;
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .fireworks-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .fireworks-overlay.active {
            display: flex;
        }

        .fireworks-text {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            padding: 30px;
            animation: pulse 0.5s infinite alternate;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.6);
            max-width: 90%;
            line-height: 1.8;
            z-index: 3001;
            backdrop-filter: blur(2px);
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.03);
            }
        }

        .close-fireworks {
            position: absolute;
            bottom: 50px;
            right: 50px;
            padding: 18px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.3rem;
            cursor: pointer;
            animation: pulse 0.5s infinite alternate;
            z-index: 3001;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.6);
        }

        .fireworks-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .stats-bar {
            background: rgba(255,255,255,0.7);
            padding: 12px 20px;
            margin: 0 20px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            margin-top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: calc(100% - 40px);
            justify-content: flex-start;
        }

        .stat-item {
            font-size: 14px;
            color: #666;
        }

        .stat-item strong {
            color: #6366f1;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="chicken-icon">🐤</span> 叽大人的衣帽间</h1>
        <div class="filter-bar">
            <select class="filter-select" id="colorFilter">
                <option value="">全部颜色</option>
            </select>
            <select class="filter-select" id="brandFilter">
                <option value="">全部风格</option>
            </select>
            <select class="filter-select" id="typeFilter">
                <option value="">全部类型</option>
            </select>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <span class="stat-item">总计: <strong>0</strong> 件</span>
    </div>

    <div class="closet-grid" id="closetGrid"></div>

    <button class="upload-btn" onclick="openUploadModal()">+</button>

    <!-- 烟花特效层 -->
    <div class="fireworks-overlay" id="fireworksOverlay">
        <canvas class="fireworks-canvas" id="fireworksCanvas"></canvas>
        <div class="fireworks-text" id="fireworksText">
            伟大的叽大人，<br>
            您忠实的咩咩仆人恭喜您的衣帽间小裙子又增加啦！！！
        </div>
        <button class="close-fireworks" onclick="closeFireworks()">咩咩退下</button>
    </div>

    <!-- 上传模态框 -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加新衣服</h2>
                <button class="close-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="uploadPlaceholder">
                    <div style="font-size: 40px; margin-bottom: 10px;">📷</div>
                    <p>点击上传照片</p>
                </div>
                <img id="previewImage" style="display: none;">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            
            <div class="form-group">
                <label class="form-label">添加时间</label>
                <input type="text" class="form-input" id="dateInput" placeholder="例如：2024年春季、2023年12月">
            </div>

            <div class="form-group">
                <label class="form-label">风格</label>
                <input type="text" class="form-input" id="brandInput" placeholder="例如：休闲、职场、复古">
            </div>

            <div class="form-group">
                <label class="form-label">类型</label>
                <select class="form-input" id="typeInput">
                    <option value="上衣">上衣</option>
                    <option value="裤子">裤子</option>
                    <option value="裙子">裙子</option>
                    <option value="外套">外套</option>
                    <option value="鞋子">鞋子</option>
                    <option value="配饰">配饰</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">颜色（可多选）</label>
                <div class="color-picker-container" id="colorPicker"></div>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="saveCloth()" disabled>保存</button>
        </div>
    </div>

    <script>
        // 预定义颜色
        console.log('应用开始加载...');

        const COLORS = [
            { name: '黑色', hex: '#000000' },
            { name: '白色', hex: '#FFFFFF' },
            { name: '灰色', hex: '#808080' },
            { name: '红色', hex: '#FF0000' },
            { name: '蓝色', hex: '#0000FF' },
            { name: '绿色', hex: '#008000' },
            { name: '黄色', hex: '#FFFF00' },
            { name: '粉色', hex: '#FFC0CB' },
            { name: '紫色', hex: '#800080' },
            { name: '棕色', hex: '#A52A2A' },
            { name: '米色', hex: '#F5F5DC' },
            { name: '卡其色', hex: '#C3B091' }
        ];

        // IndexedDB 数据库
        let db;
        const DB_NAME = 'WardrobeDB';
        const STORE_NAME = 'clothes';
        const DB_VERSION = 1;

        // 当前选中的颜色
        let selectedColors = [];
        let currentImageData = null;

        // 烟花特效相关
        let fireworksAnimation = null;
        let fireworksCanvas = null;
        let fireworksCtx = null;
        let particles = [];
        let fireworksTimer = null;

        // 初始化数据库
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('brand', 'brand', { unique: false });
                        store.createIndex('type', 'type', { unique: false });
                        store.createIndex('colors', 'colors', { unique: false });
                    }
                };
            });
        }

        // 打开上传模态框
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
            resetForm();
        }

        // 关闭上传模态框
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
            resetForm();
        }

        // 重置表单
        function resetForm() {
            document.getElementById('uploadPlaceholder').style.display = 'block';
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('brandInput').value = '';
            document.getElementById('typeInput').value = '上衣';
            document.getElementById('dateInput').value = '';
            selectedColors = [];
            currentImageData = null;
            updateColorSelection();
            document.getElementById('submitBtn').disabled = true;
        }

        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 压缩图片
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 限制最大尺寸为800px
                    const maxSize = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > maxSize) {
                            height *= maxSize / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width *= maxSize / height;
                            height = maxSize;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 压缩质量为0.7
                    currentImageData = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // 显示预览
                    const preview = document.getElementById('previewImage');
                    preview.src = currentImageData;
                    preview.style.display = 'block';
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    
                    checkFormValid();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 检查表单是否有效
        function checkFormValid() {
            const brand = document.getElementById('brandInput').value.trim();
            const valid = currentImageData && brand && selectedColors.length > 0;
            document.getElementById('submitBtn').disabled = !valid;
        }

        // 初始化颜色选择器
        function initColorPicker() {
            const container = document.getElementById('colorPicker');
            container.innerHTML = '';
            
            COLORS.forEach(color => {
                const option = document.createElement('div');
                option.className = 'color-option';
                option.style.backgroundColor = color.hex;
                option.title = color.name;
                option.onclick = () => toggleColor(color);
                container.appendChild(option);
            });
        }

        // 切换颜色选择
        function toggleColor(color) {
            const index = selectedColors.findIndex(c => c.name === color.name);
            if (index > -1) {
                selectedColors.splice(index, 1);
            } else {
                selectedColors.push(color);
            }
            updateColorSelection();
            checkFormValid();
        }

        // 更新颜色选择显示
        function updateColorSelection() {
            const options = document.querySelectorAll('.color-option');
            options.forEach(option => {
                const colorName = option.title;
                const selected = selectedColors.find(c => c.name === colorName);
                if (selected) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
        }

        // 保存衣服数据
        function saveCloth() {
            if (!currentImageData || selectedColors.length === 0) return;

            const dateInput = document.getElementById('dateInput').value.trim();
            const createdAt = dateInput || new Date().toISOString();

            const cloth = {
                brand: document.getElementById('brandInput').value.trim(),
                type: document.getElementById('typeInput').value,
                colors: selectedColors,
                image: currentImageData,
                createdAt: createdAt
            };

            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.add(cloth);

            request.onsuccess = () => {
                closeUploadModal();
                loadClothes();
                updateFilters();
                checkFireworksTrigger();
            };

            request.onerror = () => {
                alert('保存失败，请重试');
            };
        }

        // 加载衣服数据
        function loadClothes() {
            const colorFilter = document.getElementById('colorFilter').value;
            const brandFilter = document.getElementById('brandFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;

            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();

            request.onsuccess = () => {
                let clothes = request.result;

                // 应用筛选
                if (colorFilter) {
                    clothes = clothes.filter(cloth => 
                        cloth.colors.some(c => c.name === colorFilter)
                    );
                }
                if (brandFilter) {
                    clothes = clothes.filter(cloth => cloth.brand === brandFilter);
                }
                if (typeFilter) {
                    clothes = clothes.filter(cloth => cloth.type === typeFilter);
                }

                // 按创建时间倒序
                clothes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                displayClothes(clothes);
                updateStats(request.result.length);
            };
        }

        // 显示衣服列表
        function displayClothes(clothes) {
            const grid = document.getElementById('closetGrid');
            
            if (clothes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">👔</div>
                        <p>衣柜是空的，点击右下角添加第一件衣服吧！</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = clothes.map(cloth => {
                const date = cloth.createdAt || '未填写';
                const firstColor = cloth.colors[0] ? cloth.colors[0].hex : '#FFFFFF';
                const rgbColor = hexToRgb(firstColor);
                return `
                <div class="cloth-card" onclick="viewCloth(${cloth.id})" style="background: rgba(${rgbColor.r}, ${rgbColor.g}, ${rgbColor.b}, 0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteCloth(${cloth.id})">&times;</button>
                    <img src="${cloth.image}" alt="${cloth.brand} ${cloth.type}">
                    <div class="cloth-info" style="background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);">
                        <div class="cloth-brand">${cloth.brand}</div>
                        <div class="cloth-type">${cloth.type}</div>
                        <div class="cloth-date">${date}</div>
                        <div class="cloth-colors">
                            ${cloth.colors.map(color => 
                                `<div class="color-dot" style="background-color: ${color.hex}" title="${color.name}"></div>`
                            ).join('')}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // 查看衣服详情（可以扩展为模态框）
        function viewCloth(id) {
            // 简单实现，可以扩展为详情模态框
            alert('可以扩展为详情查看功能');
        }

        // 删除衣服
        function deleteCloth(id) {
            if (!confirm('确定要删除这件衣服吗？')) return;

            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(id);

            request.onsuccess = () => {
                loadClothes();
                updateFilters();
            };
        }

        // 更新筛选器选项
        function updateFilters() {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();

            request.onsuccess = () => {
                const clothes = request.result;

                // 更新颜色筛选
                const colorSet = new Set();
                clothes.forEach(cloth => {
                    cloth.colors.forEach(color => colorSet.add(color.name));
                });
                updateSelectOptions('colorFilter', [...colorSet].sort());

                // 更新品牌筛选
                const brandSet = new Set();
                clothes.forEach(cloth => brandSet.add(cloth.brand));
                updateSelectOptions('brandFilter', [...brandSet].sort());

                // 更新类型筛选
                const typeSet = new Set();
                clothes.forEach(cloth => typeSet.add(cloth.type));
                updateSelectOptions('typeFilter', [...typeSet].sort());
            };
        }

        // 更新下拉框选项
        function updateSelectOptions(selectId, options) {
            const select = document.getElementById(selectId);
            const currentValue = select.value;
            
            // 保留第一个选项（全部）
            const firstOption = select.options[0];
            select.innerHTML = '';
            select.appendChild(firstOption);

            options.forEach(option => {
                const opt = document.createElement('option');
                opt.value = option;
                opt.textContent = option;
                select.appendChild(opt);
            });

            // 尝试恢复之前的选择
            if (options.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        // 更新统计信息
        function updateStats(total) {
            document.getElementById('statsBar').innerHTML = `
                <span class="stat-item">总计: <strong>${total}</strong> 件</span>
            `;
        }

        // 等待DOM加载完成后再添加事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 完全加载完成，开始初始化...');
            
            // 监听筛选器变化
            document.getElementById('colorFilter').addEventListener('change', loadClothes);
            document.getElementById('brandFilter').addEventListener('change', loadClothes);
            document.getElementById('typeFilter').addEventListener('change', loadClothes);
            
            // 监听品牌输入
            document.getElementById('brandInput').addEventListener('input', checkFormValid);
            
            // 初始化
            initDB().then(() => {
                console.log('数据库初始化成功');
                initColorPicker();
                loadClothes();
                updateFilters();
                initFireworks();
            }).catch(error => {
                console.error('数据库初始化失败：', error);
                alert('数据库初始化失败：' + error.message);
            });
        });

        // 检查是否触发烟花特效
        function checkFireworksTrigger() {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();

            request.onsuccess = () => {
                const totalCount = request.result.length;
                if (totalCount > 0 && totalCount % 10 === 0) {
                    setTimeout(() => {
                        const isMegaFireworks = totalCount >= 100 && totalCount % 100 === 0;
                        showFireworks(isMegaFireworks);
                    }, 500);
                }
            };
        }

        // 初始化烟花
        function initFireworks() {
            fireworksCanvas = document.getElementById('fireworksCanvas');
            fireworksCtx = fireworksCanvas.getContext('2d');
            resizeFireworksCanvas();
            window.addEventListener('resize', resizeFireworksCanvas);
        }

        function resizeFireworksCanvas() {
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
        }

        // 显示烟花
        function showFireworks(isMega = false) {
            document.getElementById('fireworksOverlay').classList.add('active');
            particles = [];

            // 设置烟花文案
            const fireworksText = document.getElementById('fireworksText');
            if (isMega) {
                fireworksText.innerHTML = '伟大的叽大人，<br>您忠实的咩咩仆人恭喜您的衣帽间又增加啦，<br>小裙子太多都要装不下了，太厉害啦！！！';
            } else {
                fireworksText.innerHTML = '伟大的叽大人，<br>您忠实的咩咩仆人恭喜您的衣帽间小裙子又增加啦！！！';
            }

            createFireworks(isMega);
            animateFireworks(isMega);

            // 超级烟花持续10-15秒
            if (isMega) {
                fireworksTimer = setTimeout(() => {
                    closeFireworks();
                }, 12000);
            }
        }

        // 关闭烟花
        function closeFireworks() {
            document.getElementById('fireworksOverlay').classList.remove('active');
            if (fireworksAnimation) {
                cancelAnimationFrame(fireworksAnimation);
            }
            if (fireworksTimer) {
                clearTimeout(fireworksTimer);
            }
        }

        // 创建烟花粒子
        function createFireworks(isMega = false) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA', '#FCBAD3', '#A8D8EA', '#FFD93D', '#6BCB77', '#4D96FF', '#FF6F61'];

            // 超级烟花：更多爆炸，更多粒子
            const explosionCount = isMega ? 20 : 12;
            const minParticles = isMega ? 100 : 60;
            const maxParticles = isMega ? 150 : 140;
            const baseVelocity = isMega ? 4 : 3;
            const velocityRange = isMega ? 7 : 6;

            for (let i = 0; i < explosionCount; i++) {
                setTimeout(() => {
                    const x = centerX + (Math.random() - 0.5) * (isMega ? 900 : 700);
                    const y = centerY + (Math.random() - 0.5) * (isMega ? 600 : 500);
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const particleCount = minParticles + Math.random() * (maxParticles - minParticles);

                    for (let j = 0; j < particleCount; j++) {
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = baseVelocity + Math.random() * velocityRange;
                        particles.push({
                            x: x,
                            y: y,
                            vx: Math.cos(angle) * velocity,
                            vy: Math.sin(angle) * velocity,
                            alpha: 1,
                            color: color,
                            size: (2 + Math.random() * 4) * (isMega ? 1.3 : 1),
                            gravity: 0.03 + Math.random() * 0.05,
                            decay: (0.008 + Math.random() * 0.012) * (isMega ? 0.8 : 1),
                            sparkle: Math.random() > 0.7
                        });
                    }
                }, i * (isMega ? 100 : 150));
            }
        }

        // 烟花动画
        function animateFireworks(isMega = false) {
            fireworksCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            fireworksCtx.fillRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.alpha -= p.decay;
                p.size *= 0.99;
                p.vx *= 0.99;
                p.vy *= 0.99;

                if (p.alpha <= 0) {
                    particles.splice(index, 1);
                    return;
                }

                // 绘制粒子
                fireworksCtx.beginPath();
                fireworksCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                fireworksCtx.fillStyle = p.color;
                fireworksCtx.globalAlpha = p.alpha;
                fireworksCtx.fill();

                // 闪烁效果
                if (p.sparkle && Math.random() > 0.5) {
                    fireworksCtx.beginPath();
                    fireworksCtx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
                    fireworksCtx.fillStyle = '#FFFFFF';
                    fireworksCtx.globalAlpha = p.alpha * 0.5;
                    fireworksCtx.fill();
                }

                // 发光效果
                fireworksCtx.beginPath();
                fireworksCtx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                fireworksCtx.fillStyle = p.color;
                fireworksCtx.globalAlpha = p.alpha * 0.3;
                fireworksCtx.fill();

                fireworksCtx.globalAlpha = 1;
            });

            // 持续随机创建新烟花
            const spawnRate = isMega ? 0.12 : 0.08;
            const particleCount = isMega ? 60 : 40;

            if (Math.random() < spawnRate) {
                const centerX = Math.random() * fireworksCanvas.width;
                const centerY = Math.random() * fireworksCanvas.height * 0.7;
                const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA', '#FCBAD3', '#A8D8EA', '#FFD93D', '#6BCB77', '#4D96FF', '#FF6F61'];
                const color = colors[Math.floor(Math.random() * colors.length)];

                for (let j = 0; j < particleCount; j++) {
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 3 + Math.random() * 5;
                    particles.push({
                        x: centerX,
                        y: centerY,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        alpha: 1,
                        color: color,
                        size: 2 + Math.random() * 4,
                        gravity: 0.03 + Math.random() * 0.05,
                        decay: 0.01 + Math.random() * 0.015,
                        sparkle: Math.random() > 0.7
                    });
                }
            }

            fireworksAnimation = requestAnimationFrame(() => animateFireworks(isMega));
        }

        // 十六进制转RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
